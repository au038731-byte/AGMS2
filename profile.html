<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">

    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Member Profile</title>

    <link rel="stylesheet" href="css/style.css">

</head>

<body>

    <div class="sidebar">

        <div class="logo">

            <h2>🏢 AGMS</h2>

            <p>Andiwaly Group</p>

        </div>

        <ul>

            <li><a href="dashboard.html">🏠 Dashboard</a></li>

            <li><a href="members.html">👥 Members</a></li>

            <li><a href="add-member.html">➕ Add Member</a></li>

            <li><a href="payments.html">💰 Payments</a></li>

            <li><a href="reports.html">📊 Reports</a></li>

            <li><a href="#" onclick="logout()">🚪 Logout</a></li>

        </ul>

    </div>

    <div class="main">

        <div class="topbar">

            <h1>Member Profile</h1>

        </div>

        <br>

        <div class="profile-card">

            <h2 id="memberName"></h2>

            <hr><br>

            <p><b>📞 Phone:</b> <span id="phone"></span></p>

            <br>

            <p><b>📧 Email:</b> <span id="email"></span></p>

            <br>

            <p><b>💰 Monthly Fee:</b> Rs. <span id="amount"></span></p>

            <br>

            <p><b>✅ Status:</b> <span id="status"></span></p>

            <br>

            <p><b>📅 Join Date:</b> <span id="joinDate"></span></p>

            <br>

            <p><b>📝 Notes:</b></p>

            <p id="notes"></p>

        </div>

    </div>

    <script>

        let index = localStorage.getItem("selectedMember");

        let members = JSON.parse(localStorage.getItem("members")) || [];

        let m = members[index];

        if (m) {

            document.getElementById("memberName").innerHTML = m.name;

            document.getElementById("phone").innerHTML = m.phone || "-";

            document.getElementById("email").innerHTML = m.email || "-";

            document.getElementById("amount").innerHTML = m.amount || "0";

            document.getElementById("status").innerHTML = m.status;

            document.getElementById("joinDate").innerHTML = m.joinDate || "-";

            document.getElementById("notes").innerHTML = m.notes || "No Notes";

        }

    </script>

    <script src="js/auth.js"></script>

</body>

</html>
